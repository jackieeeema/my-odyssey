<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的奥德赛时期</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="奥德赛">
<meta name="theme-color" content="#0a0d14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --bg-deep: #0a0d14;
  --bg-card: #111827;
  --bg-card-hover: #1a2235;
  --text-primary: #e8ecf2;
  --text-secondary: #8a96a8;
  --text-muted: #4a5568;
  --accent: #6b8cce;
  --accent-glow: rgba(107,140,206,0.35);
  --border: rgba(107,140,206,0.18);
  --star-color: rgba(255,255,255,0.85);
  --gold: #c9a96e;
  --day-hue: 210;
  --font-main: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --page-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 80px rgba(107,140,206,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-main);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#star-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#cover {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 1.5s ease, visibility 1.5s ease;
}
#cover.fade-out { opacity: 0; visibility: hidden; }

.cover-title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--text-primary);
  opacity: 0;
  animation: fadeUp 1.2s 0.5s forwards;
}
.cover-subtitle {
  font-size: clamp(0.75rem, 2vw, 1rem);
  letter-spacing: 0.5em;
  color: var(--text-secondary);
  margin-top: 1rem;
  opacity: 0;
  animation: fadeUp 1.2s 1s forwards;
}
.cover-waves {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 200px;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 2s 1.5s forwards;
}
.cover-waves svg { width: 100%; height: 100%; }

.cover-enter {
  margin-top: 3rem;
  padding: 0.7em 2.5em;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--accent);
  font-family: var(--font-main);
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 1s 2s forwards;
  transition: var(--transition);
}
.cover-enter:hover {
  background: rgba(107,140,206,0.1);
  box-shadow: 0 0 30px var(--accent-glow);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ==================== TOP BAR ==================== */
#topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 56px;
  background: linear-gradient(to bottom, var(--bg-deep) 60%, transparent);
  opacity: 0;
  transition: opacity 0.6s;
}
#topbar.visible { opacity: 1; }

#progress-bar {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
}
#progress-dots { display: flex; gap: 6px; }
.pdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: 0.3s;
}
.pdot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
.pdot.done { background: rgba(107,140,206,0.4); }

.top-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 8px;
  transition: var(--transition);
}
.top-btn:hover { color: var(--accent); background: rgba(107,140,206,0.1); }

/* ==================== BOOK CONTAINER ==================== */
#book {
  position: relative;
  width: 100%;
  height: 100vh;
  perspective: 2000px;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 40px 40px;
}

.page-inner {
  width: 100%;
  max-width: 680px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  padding: 3rem 3.5rem;
  background: rgba(17, 24, 39, 0.85);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  box-shadow: var(--page-shadow);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.page-inner::-webkit-scrollbar { width: 4px; }
.page-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ==================== PAGE TRANSITIONS ==================== */
.page-enter { animation: pageEnter 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
.page-exit { animation: pageExit 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

@keyframes pageEnter {
  from { opacity: 0; transform: translateX(60px) scale(0.97); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes pageExit {
  from { opacity: 1; transform: translateX(0) scale(1); }
  to { opacity: 0; transform: translateX(-60px) scale(0.97); }
}

/* ==================== TYPOGRAPHY ==================== */
.entry-date {
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.entry-title {
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--text-primary);
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.entry-section-label {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-top: 2.5rem;
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.entry-section-label::before {
  content: '✦';
  font-size: 0.6rem;
}
.entry-body {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--text-secondary);
  margin-bottom: 0.8rem;
}
.entry-body:first-of-type { color: var(--text-primary); }
.entry-quote {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--text-secondary);
  font-style: italic;
  text-align: center;
  padding: 1.5rem 2rem;
  margin-top: 1rem;
  border-left: 2px solid var(--accent);
  background: rgba(107,140,206,0.05);
  border-radius: 0 8px 8px 0;
}
.entry-divider {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  letter-spacing: 0.5em;
  margin: 2.5rem 0;
  opacity: 0.5;
}

/* Insight cards - 慢慢想明白 页面 (卡片列表) */
.insights-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1rem;
  padding: 0.5rem;
}
.insight-card {
  padding: 1.5rem 1.6rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.insight-card:hover {
  border-color: rgba(107,140,206,0.35);
  background: var(--bg-card-hover);
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(0,0,0,0.18);
}
.insight-card::after {
  content: '→';
  position: absolute;
  right: 1.2rem;
  bottom: 1.2rem;
  color: var(--accent);
  font-size: 0.85rem;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.insight-card:hover::after { opacity: 1; }
.insight-meta {
  font-size: 0.62rem;
  letter-spacing: 0.16em;
  color: var(--text-muted);
  margin-bottom: 0.7rem;
  text-transform: uppercase;
}
.insight-quote {
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.7;
  font-style: italic;
  padding-left: 0.9rem;
  border-left: 2px solid var(--accent);
}

/* Insight detail modal - 独立详情弹窗 */
#insight-modal {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(12px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
#insight-modal.open { display: flex; }
.insight-modal-inner {
  background: var(--bg-primary);
  width: 100%;
  max-width: 620px;
  max-height: 85vh;
  overflow-y: auto;
  border-radius: 18px;
  padding: 2.5rem 2.8rem;
  border: 1px solid var(--border);
  box-shadow: 0 16px 64px rgba(0,0,0,0.4);
  animation: insightIn 0.3s ease;
}
@keyframes insightIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.insight-modal-inner::-webkit-scrollbar { width: 4px; }
.insight-modal-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.insight-modal-meta {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  color: var(--accent);
  margin-bottom: 1rem;
  text-transform: uppercase;
}
.insight-modal-quote {
  font-size: 1.25rem;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.75;
  font-style: italic;
  margin-bottom: 2rem;
  padding: 1.2rem 1.5rem;
  border-left: 3px solid var(--accent);
  background: rgba(107,140,206,0.06);
  border-radius: 0 10px 10px 0;
}
.insight-modal-text {
  font-size: 0.92rem;
  line-height: 2.1;
  color: var(--text-secondary);
  white-space: pre-line;
}
.insight-modal-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.insight-nav-btn {
  font-size: 0.78rem;
  color: var(--text-muted);
  background: transparent;
  border: 1px solid var(--border);
  padding: 0.5em 1.2em;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: var(--font-main);
  letter-spacing: 0.05em;
}
.insight-nav-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(107,140,206,0.06);
}
.insight-nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}
.insight-nav-btn:disabled:hover {
  color: var(--text-muted);
  border-color: var(--border);
  background: transparent;
}
.insight-nav-counter {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.08em;
}
#insight-close {
  font-size: 0.82rem;
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 0.55em 1.6em;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: var(--font-main);
  letter-spacing: 0.05em;
}
#insight-close:hover { box-shadow: 0 0 20px var(--accent-glow); }

/* ==================== FLOATING CARDS WALL ==================== */
#cards-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(10, 13, 20, 0.95);
  backdrop-filter: blur(20px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  overflow-y: auto;
}
#cards-overlay.open { display: flex; }

.cards-wall {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  padding: 2rem 0;
}

.fcard {
  padding: 1.5rem;
  background: rgba(17, 24, 39, 0.9);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-family: var(--font-main);
}
.fcard:hover {
  border-color: var(--accent);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.fcard-meta { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.15em; margin-bottom: 0.5rem; }
.fcard-quote { font-size: 0.9rem; color: var(--text-primary); font-weight: 500; line-height: 1.5; margin-bottom: 0.8rem; }
.fcard-ref { font-size: 0.75rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

#cards-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: rgba(17,24,39,0.9);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 1.2rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  z-index: 501;
}
#cards-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* Card modal */
#card-modal {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(10,13,20,0.97);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
#card-modal.open { display: flex; }
.card-modal-content {
  max-width: 600px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 2.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  text-align: left;
}
.card-modal-content::-webkit-scrollbar { width: 4px; }
.card-modal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.card-modal-quote { font-size: 1.2rem; color: var(--text-primary); font-weight: 500; line-height: 1.7; margin-bottom: 1.5rem; }
.card-modal-text { font-size: 0.9rem; color: var(--text-secondary); line-height: 2; white-space: pre-line; }
#card-modal-close { background: var(--accent); border: none; color: #fff; font-size: 0.85rem; padding: 0.6em 1.5em; border-radius: 20px; cursor: pointer; transition: var(--transition); font-family: var(--font-main); }
#card-modal-close:hover { box-shadow: 0 0 20px var(--accent-glow); }

/* ==================== SEARCH ==================== */
#search-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(10,13,20,0.97);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 15vh;
}
#search-overlay.open { display: flex; }
#search-input-wrap {
  width: 100%;
  max-width: 560px;
  padding: 0 1.5rem;
}
#search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  font-size: 1rem;
  color: var(--text-primary);
  font-family: var(--font-main);
  outline: none;
  transition: var(--transition);
}
#search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
#search-results { margin-top: 1rem; }
.sr-item {
  padding: 1rem 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.sr-item:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.sr-item mark { background: rgba(107,140,206,0.3); color: var(--accent); border-radius: 2px; padding: 0 2px; }
#search-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: rgba(17,24,39,0.9);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 1.2rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  z-index: 501;
}
#search-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* ==================== NAV ==================== */
.nav-hint {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 1rem;
  opacity: 0;
  transition: opacity 0.6s;
  pointer-events: none;
}
.nav-hint.visible { opacity: 1; pointer-events: auto; }
.nav-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(17,24,39,0.8);
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:hover { background: var(--bg-card-hover); border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ==================== PRINT ==================== */
@media print {
  #topbar, .nav-hint, #cards-overlay, #search-overlay, #card-modal, #insight-modal, .nav-hint, #write-fab, #write-overlay { display: none !important; }
  .page { position: static; height: auto; padding: 2rem; }
  .page-inner { max-height: none; overflow: visible; box-shadow: none; border: none; background: white; color: black; }
}

/* ==================== WRITE PANEL ==================== */
#write-fab {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 200;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  background: rgba(17,24,39,0.9);
  color: var(--accent);
  font-size: 1.4rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(107,140,206,0.3);
  backdrop-filter: blur(10px);
}
#write-fab:hover {
  background: rgba(107,140,206,0.15);
  box-shadow: 0 4px 30px rgba(107,140,206,0.5);
  transform: scale(1.08);
}

#write-overlay {
  position: fixed;
  inset: 0;
  z-index: 700;
  background: rgba(10,13,20,0.97);
  backdrop-filter: blur(20px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  overflow-y: auto;
}
#write-overlay.open { display: flex; }

.write-panel {
  width: 100%;
  max-width: 600px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 2rem 2.2rem;
  box-shadow: 0 16px 64px rgba(0,0,0,0.5);
  animation: insightIn 0.3s ease;
  max-height: 90vh;
  overflow-y: auto;
}
.write-panel::-webkit-scrollbar { width: 4px; }
.write-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.write-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.5rem;
}
.write-title {
  font-size: 1.1rem;
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: 0.08em;
}
.write-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.3rem;
  cursor: pointer;
  padding: 0.3rem;
  border-radius: 6px;
  transition: var(--transition);
}
.write-close:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }

.write-textarea {
  width: 100%;
  min-height: 180px;
  max-height: 50vh;
  background: rgba(10,13,20,0.6);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  font-size: 0.92rem;
  line-height: 1.9;
  color: var(--text-primary);
  font-family: var(--font-main);
  outline: none;
  resize: vertical;
  transition: border-color 0.3s;
}
.write-textarea:focus { border-color: var(--accent); }
.write-textarea::placeholder { color: var(--text-muted); }

.write-meta {
  display: flex;
  gap: 0.8rem;
  margin-top: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.write-category {
  display: flex;
  gap: 0.5rem;
}
.cat-btn {
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  padding: 0.45em 1em;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-main);
}
.cat-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(107,140,206,0.1);
}

// ===== PASSWORD GATE =====
const PASS_HASH = '5f4dcc3b5aa765d61d8327deb882cf99'; // placeholder
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return hash.toString(36);
}
const CORRECT_HASH = simpleHash('201076tuesday');

function checkPassword() {
  const input = document.getElementById('gate-input').value;
  if (simpleHash(input) === CORRECT_HASH) {
    document.getElementById('password-gate').classList.add('unlocked');
    sessionStorage.setItem('odyssey_unlocked', '1');
  } else {
    document.getElementById('gate-error').classList.add('show');
    document.getElementById('gate-input').value = '';
    document.getElementById('gate-input').focus();
    setTimeout(() => document.getElementById('gate-error').classList.remove('show'), 2000);
  }
}

// 回车触发
document.getElementById('gate-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPassword();
});

// session 内记住登录状态
if (sessionStorage.getItem('odyssey_unlocked') === '1') {
  document.getElementById('password-gate').classList.add('unlocked');
}

// ===== STAR FIELD =====
const starCanvas = document.getElementById('star-canvas');
const sctx = starCanvas.getContext('2d');
let stars = [];

function initStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.5,
      o: Math.random(),
      speed: 0.002 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(t * s.speed + s.phase))})`;
    sctx.fill();
  });
}

function animateStars(t) { drawStars(t); requestAnimationFrame(animateStars); }
initStars();
window.addEventListener('resize', initStars);
animateStars(0);

从"一年"到"6 个月"，外部世界没有变，是你对时间的感知变了。这种感知切换有个名字，叫 FOMO 被激活——Fear of Missing Out。很多内容的叙事结构本身就是一个精心设计的 FOMO 装置：先制造危机感，再展示"已经上岸的人"，最后给出行动指令。

但今天的紧迫感，其实不是外部给的，是你本来就在一个"需要重新校准"的时间点上——工作上在冷板凳、财务上有深套的房子、人生上在 28 岁前后重新问自己要不要继续这样。这三种紧迫感叠加起来，你本来就已经很容易被"紧迫"两个字戳到。

如果今天刷到的不是这一期访谈，是"楼市还会跌 30%"，你会觉得房子紧迫；如果是"移民窗口关闭"，你会觉得身份紧迫；如果是"35 岁职场断崖"，你会觉得年龄紧迫。问题不在"6 个月"这个数字上，问题在——你现在的状态特别容易"接招"。

三条提醒，送给自己：

一、区分"时代节奏"和"个人节奏"。时代可能真的在加速，但你的人生节奏不需要同步到时代。你是一个具体的人，有具体的工作、具体的房子、具体的关系。时代是背景，不是你的日程表。

二、把抽象的紧迫感翻译成具体的小动作，它就不紧迫了。不用 6 个月改造人生——这周认真用一次新工具做一个真实的小任务、这个月列 3 件可以被外包的事、这三个月每周花 2 小时读一点内容。具体的东西不制造紧迫感，只有抽象的东西才制造紧迫感。

三、永远不要在 FOMO 状态下做重大决定。清醒的你做的决定 > 激动的你做的决定。这条铁律比任何时代判断都可靠。早上那个"给自己一年冷静期"的决定，是更清醒的你做的；半小时后被一段内容推到高肾上腺素状态的你，不是更清醒，只是被临时点燃。

  }

// ===== BOOK LOGIC =====
let currentPage = 0;
const book = document.getElementById('book');
const dotsEl = document.getElementById('progress-dots');
const labelEl = document.getElementById('page-label');
const navHint = document.getElementById('nav-hint');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function buildDots() {
  dotsEl.innerHTML = '';
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot';
    if (i === 0) d.classList.add('active');
    else if (i < currentPage) d.classList.add('done');
    dotsEl.appendChild(d);
  });
}

function renderPage(idx, dir) {
  const existing = book.querySelector('.page');
  if (existing) existing.remove();

  const p = document.createElement('div');
  p.className = 'page page-enter';
  p.innerHTML = `<div class="page-inner">${pages[idx].content}</div>`;
  book.appendChild(p);

  // Build insight cards if this is the insights page
  if (pages[idx].label === '慢慢想明白') {
    setTimeout(buildInsightsPage, 50);
  }

  labelEl.textContent = pages[idx].label;
  buildDots();
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === pages.length - 1;
  currentPage = idx;
}

function enterBook() {
  document.getElementById('cover').classList.add('fade-out');
  document.getElementById('topbar').classList.add('visible');
  navHint.classList.add('visible');
  setTimeout(() => {
    document.getElementById('cover').style.display = 'none';
    renderPage(1);
  }, 1500);
}

function goPage(n) {
  if (n < 0 || n >= pages.length) return;
  const existing = book.querySelector('.page');
  if (existing) existing.classList.add('page-exit');
  setTimeout(() => renderPage(n), 300);
}

function prevPage() { goPage(currentPage - 1); }
function nextPage() { goPage(currentPage + 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 60) { if (dx > 0) nextPage(); else prevPage(); }
});

// ===== CARDS =====
function buildCards() {
  const wall = document.getElementById('cards-wall');
  wall.innerHTML = '';
  insights.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML = `<div class="fcard-meta">${c.meta}</div><div class="fcard-quote">${c.quote}</div><div class="fcard-ref">${c.text.substring(0, 60)}...</div>`;
    card.onclick = () => openCard(i);
    wall.appendChild(card);
  });
}

function openCards() {
  buildCards();
  document.getElementById('cards-overlay').classList.add('open');
}
function closeCards() { document.getElementById('cards-overlay').classList.remove('open'); }
let currentCardIdx = 0;
function openCard(i) {
  currentCardIdx = i;
  const c = insights[i];
  document.getElementById('card-modal-quote').textContent = c.quote;
  document.getElementById('card-modal-text').textContent = c.text;
  document.getElementById('card-modal').classList.add('open');
}
function closeCardModal() { document.getElementById('card-modal').classList.remove('open'); }
function shareCurrentCard() {
  const c = insights[currentCardIdx];
  openShare(c.quote, c.text, c.meta);
}

// ===== INSIGHTS PAGE (慢慢想明白) - 独立卡片 + 详情弹窗 =====
let currentInsightIdx = 0;
let insightsSorted = []; // 按日期倒序的视图副本——原始 insights 数组不动

// 从 meta 里提取日期 "5月9日 · ..." → 数字 509，用于排序
function parseInsightDate(meta) {
  const m = meta.match(/(\d+)月(\d+)日/);
  if (!m) return 0;
  return parseInt(m[1]) * 100 + parseInt(m[2]);
}

function buildInsightsPage() {
  const grid = document.getElementById('insights-grid');
  if (!grid) return;
  
  // 每次渲染时重新排序——保证新增的 insight 自动归位
  insightsSorted = [...insights].sort((a, b) => parseInsightDate(b.meta) - parseInsightDate(a.meta));
  
  grid.innerHTML = '';
  
  insightsSorted.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'insight-card';
    card.innerHTML = `
      <div class="insight-meta">${c.meta}</div>
      <div class="insight-quote">${c.quote}</div>
    `;
    card.onclick = () => openInsight(i);
    grid.appendChild(card);
  });
}

function openInsight(i) {
  currentInsightIdx = i;
  const c = insightsSorted[i];
  document.getElementById('insight-modal-meta').textContent = c.meta;
  document.getElementById('insight-modal-quote').textContent = c.quote;
  document.getElementById('insight-modal-text').textContent = c.text;
  document.getElementById('insight-counter').textContent = `${i + 1} / ${insightsSorted.length}`;
  document.getElementById('insight-prev').disabled = (i === 0);
  document.getElementById('insight-next').disabled = (i === insightsSorted.length - 1);
  document.getElementById('insight-modal').classList.add('open');
}

function closeInsightModal() {
  document.getElementById('insight-modal').classList.remove('open');
}

function navigateInsight(dir) {
  const next = currentInsightIdx + dir;
  if (next >= 0 && next < insightsSorted.length) {
    openInsight(next);
  }
}

// ===== SEARCH =====
const allText = pages.map(p => p.content.replace(/<[^>]+>/g, '')).join('\n');

function doSearch(q) {
  const res = document.getElementById('search-results');
  if (!q.trim()) { res.innerHTML = ''; return; }
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'gi');
  const matches = [...allText.matchAll(new RegExp(escaped, 'gi'))];
  let html = '';
  if (matches.length === 0) {
    html = '<div style="color:var(--text-muted);text-align:center;padding:1rem;">没有找到相关内容</div>';
  } else {
    const idx = matches[0].index;
    const start = Math.max(0, idx - 40);
    const end = Math.min(allText.length, idx + 100);
    let snippet = allText.substring(start, end).replace(re, m => `<mark>${m}</mark>`);
    if (start > 0) snippet = '...' + snippet;
    if (end < allText.length) snippet = snippet + '...';
    html = `<div class="sr-item">${snippet}</div>`;
  }
  res.innerHTML = html;
}

function openSearch() { document.getElementById('search-overlay').classList.add('open'); document.getElementById('search-input').focus(); }
function closeSearch() { document.getElementById('search-overlay').classList.remove('open'); document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; }
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });

// ===== WRITE PANEL =====
let writeCategory = 'auto';

function openWrite() {
  document.getElementById('write-overlay').classList.add('open');
  document.getElementById('write-input').focus();
  document.getElementById('write-result').classList.remove('show');
}
function closeWrite() {
  document.getElementById('write-overlay').classList.remove('open');
}

function setCategory(cat) {
  writeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cat-' + cat).classList.add('active');
}

function classifyContent(text) {
  // AI 分类逻辑：根据内容特征判断属于哪个模块
  const insightKeywords = ['想明白', '道理', '原来', '后来发现', '领悟', '醒悟', '意识到', '规律', '本质', '真相', '所以说', '这就是', '关于「', '一个人如果', '长大的一部分'];
  const dailyKeywords = ['今天', '昨天', '刚才', '上午', '下午', '晚上', '周末', '早上', '中午', '去了', '看了', '吃了', '聊了', '做了', '发生了', '心情', '心境', '感觉'];
  
  let insightScore = 0;
  let dailyScore = 0;
  
  insightKeywords.forEach(kw => { if (text.includes(kw)) insightScore++; });
  dailyKeywords.forEach(kw => { if (text.includes(kw)) dailyScore++; });
  
  // 如果内容比较长（超过200字）且有明显的总结性语句，偏向 insight
  if (text.length > 200 && (text.includes('所以') || text.includes('原来') || text.includes('后来想'))) insightScore += 2;
  
  // 如果有具体的时间描述和事件，偏向 daily
  if (/\d+[点时]/.test(text) || /今天|昨天|刚才/.test(text)) dailyScore += 2;
  
  // 如果内容是一个感悟/道理的表达（偏抽象），偏向 insight
  if (text.length < 300 && !/(去了|看了|吃了|做了|发生)/.test(text) && /(是|就是|其实|原来|大概)/.test(text)) insightScore += 1;
  
  return insightScore > dailyScore ? 'insight' : 'daily';
}

function getTodayStr() {
  const now = new Date();
  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  return `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 周${weekDays[now.getDay()]}`;
}

function getShortDate() {
  const now = new Date();
  return `${now.getMonth()+1}月${now.getDate()}日`;
}

function formatAsDaily(text) {
  const lines = text.split('\n').filter(l => l.trim());
  let body = '';
  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed) {
      body += `<div class="entry-body">▸ ${trimmed}</div>\n`;
    }
  });
  return {
    pageContent: `
      <div class="entry-date">${getTodayStr()}</div>
      <div class="entry-title">每日记录</div>
      <div class="entry-section-label">【今日记事】</div>
      ${body}
      <div class="entry-section-label">【原文】</div>
      <div class="entry-body" style="font-style:italic;color:var(--text-muted);">${text}</div>
    `,
    label: getShortDate()
  };
}

function extractQuote(text) {
  // 尝试提取一句核心金句（短句、有引号的句子优先）
  const sentences = text.split(/[。\n]/).filter(s => s.trim().length > 4 && s.trim().length < 50);
  if (sentences.length === 0) {
    return '"' + text.substring(0, 40) + '..."';
  }
  // 优先选有引号的
  const quoted = sentences.find(s => s.includes('"') || s.includes('"') || s.includes('「'));
  if (quoted) return '"' + quoted.trim().replace(/["""]/g, '') + '"';
  // 选最短的有意义的句子
  sentences.sort((a, b) => a.length - b.length);
  return '"' + sentences[0].trim() + '"';
}

function generateInsightTitle(text) {
  // 尝试从内容中提取一个简短的主题标签
  const patterns = [
    /关于[「"「](.+?)[」"」]/,
    /原来(.{4,15})/,
    /(.{4,12})这件事/,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) return `关于「${m[1].substring(0,10)}」`;
  }
  // fallback: 取前10个字
  return text.substring(0, 12).replace(/[，。、\n]/g, '') + '...';
}

function formatAsInsight(text) {
  const quote = extractQuote(text);
  const title = generateInsightTitle(text);
  const meta = `${getShortDate()} · ${title}`;
  return {
    insightData: { meta, quote, text },
    meta, quote
  };
}

function submitWrite() {
  const input = document.getElementById('write-input');
  const text = input.value.trim();
  if (!text) return;
  
  let category = writeCategory;
  if (category === 'auto') {
    category = classifyContent(text);
  }
  
  const resultEl = document.getElementById('write-result');
  const resultContent = document.getElementById('write-result-content');
  
  if (category === 'daily') {
    const { pageContent, label } = formatAsDaily(text);
    // 在"慢慢想明白"页面前插入新的每日记录页
    const insightIdx = pages.findIndex(p => p.label === '慢慢想明白');
    const newPage = { label, content: pageContent };
    if (insightIdx > -1) {
      pages.splice(insightIdx, 0, newPage);
    } else {
      pages.push(newPage);
    }
    buildDots();
    resultContent.textContent = `✅ 已添加到「每日记录」→ ${label}\n\n分类依据：内容包含具体事件/时间描述\n\n你可以翻到对应页面查看。`;
    resultEl.classList.add('show');
  } else {
    const { insightData, meta, quote } = formatAsInsight(text);
    insights.unshift(insightData);
    resultContent.textContent = `✅ 已添加到「慢慢想明白的事」\n\n标题：${meta}\n金句：${quote}\n\n分类依据：内容偏向感悟/道理的表达\n\n你可以在 ✦ 卡片墙中查看。`;
    resultEl.classList.add('show');
    // 如果当前在 insights 页面，重新渲染
    if (pages[currentPage] && pages[currentPage].label === '慢慢想明白') {
      setTimeout(buildInsightsPage, 100);
    }
  }
  
  // 保存到 localStorage
  saveToLocal(category, text);
}

function saveToLocal(category, text) {
  const stored = JSON.parse(localStorage.getItem('odyssey_entries') || '[]');
  stored.push({
    category,
    text,
    date: new Date().toISOString(),
    dateStr: getTodayStr()
  });
  localStorage.setItem('odyssey_entries', JSON.stringify(stored));
}

// 页面加载时恢复 localStorage 中的条目
function restoreLocalEntries() {
  const stored = JSON.parse(localStorage.getItem('odyssey_entries') || '[]');
  stored.forEach(entry => {
    if (entry.category === 'daily') {
      const { pageContent, label } = formatAsDaily(entry.text);
      const insightIdx = pages.findIndex(p => p.label === '慢慢想明白');
      const newPage = { label: entry.dateStr ? entry.dateStr.split(' ')[0].replace(/\d+年/, '') : label, content: pageContent };
      if (insightIdx > -1) pages.splice(insightIdx, 0, newPage);
      else pages.push(newPage);
    } else {
      const { insightData } = formatAsInsight(entry.text);
      insights.unshift(insightData);
    }
  });
  if (stored.length > 0) buildDots();
}
restoreLocalEntries();

// ===== SHARE CARD =====
function openShare(quote, body, date) {
  document.getElementById('share-card-quote').textContent = quote || '';
  document.getElementById('share-card-body').textContent = body || '';
  document.getElementById('share-card-date').textContent = date || getTodayStr();
  document.getElementById('share-overlay').classList.add('open');
  document.getElementById('share-tip').classList.remove('show');
}

function closeShare() {
  document.getElementById('share-overlay').classList.remove('open');
}

function saveShareImage() {
  const card = document.getElementById('share-card-render');
  html2canvas(card, {
    scale: 3,
    backgroundColor: '#0f1923',
    useCORS: true
  }).then(canvas => {
    const img = canvas.toDataURL('image/png');
    // 方案1：尝试直接下载
    const link = document.createElement('a');
    link.download = '奥德赛分享卡片.png';
    link.href = img;
    
    // 方案2：同时显示图片供长按保存（移动端备用）
    const overlay = document.getElementById('share-overlay');
    const preview = overlay.querySelector('.share-card-preview');
    preview.innerHTML = `
      <div style="text-align:center;padding:1rem;">
        <img src="${img}" style="width:100%;border-radius:12px;display:block;margin-bottom:1rem;">
        <div style="font-size:0.75rem;color:var(--text-muted);line-height:1.6;">
          👆 长按图片保存到相册<br>
          或点击下方按钮下载
        </div>
      </div>
    `;
    
    // 触发下载
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    
    document.getElementById('share-tip').classList.add('show');
  });
}

// 点击内容触发分享
document.addEventListener('click', function(e) {
  const target = e.target;
  
  // 长按检测（移动端）或双击检测
  if (target.classList.contains('entry-quote')) {
    openShare(target.textContent.trim(), '', '');
  }
});

// 双击触发分享（桌面端）
document.addEventListener('dblclick', function(e) {
  const target = e.target;
  if (target.classList.contains('entry-quote') || target.classList.contains('entry-body')) {
    const text = target.textContent.trim();
    if (text.length > 10) {
      openShare(text.length < 80 ? text : '', text.length >= 80 ? text : '', '');
    }
  }
});

// 为 insight 卡片添加分享按钮
function openInsightShare(idx) {
  const c = insightsSorted[idx];
  openShare(c.quote, c.text, c.meta);
}

// 覆盖 insight modal，添加分享按钮
const origOpenInsight = openInsight;
openInsight = function(i) {
  origOpenInsight(i);
  // 在 modal nav 区域插入分享按钮（如果不存在）
  const nav = document.querySelector('.insight-modal-nav');
  if (nav && !document.getElementById('insight-share-btn')) {
    const btn = document.createElement('button');
    btn.id = 'insight-share-btn';
    btn.className = 'insight-nav-btn';
    btn.textContent = '📷 分享';
    btn.onclick = () => openInsightShare(currentInsightIdx);
    nav.appendChild(btn);
  }
};

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('share-overlay').classList.contains('open')) closeShare();
    if (document.getElementById('write-overlay').classList.contains('open')) closeWrite();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

  if (idx > -1) { currentPage = idx; renderPage(); }
